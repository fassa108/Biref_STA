{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block titre %}
        Document
        {% endblock titre %}
    </title>
    <!-- <link rel="stylesheet" href="{% static 'css/style.css' %}"> -->
    <script src="https://kit.fontawesome.com/cea1cd501f.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container justify-content-spacearound">
        <div class="row d-flex" >
            <div class="d-flex flex-column align-items-center p-3 vh-100 bg-dark shadow start-0 top-0 gap-4 col-2" >
                <a class="navbar-brand" href="{% url 'entree' %}">STA</a>        
                <a href="{% url 'entree' %}"><i class="fa-solid fa-box fa-lg text-light"></i>Les journaux</a>
                <a href="{% url 'entree' %}"><i class="fa-solid fa-qrcode fa-lg text-light"></i>Mes journaux</a>
                <a href="{% url 'entree' %}"><i class="fa-solid fa-gear fa-lg text-light"></i>les utilisateurs</a>
                
                {% if request.user.is_authenticated %}
                    <span class="text-white me-3">{{ request.user.username }}</span>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">Déconnexion</button>
                    </form>
                {% endif %}
            </div>
            <div class="col-10 mt-4 bg-dark m-3">
            
                {% block content %}
                    
                {% endblock content %}
            </div>
        </div>
    </div>
    
    
        
        
</body>
</html>
