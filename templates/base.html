{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block titre %}
        Document
        {% endblock titre %}
    </title>
    <!-- <link rel="stylesheet" href="{% static 'css/style.css' %}"> -->
    <script src="https://kit.fontawesome.com/cea1cd501f.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class=" justify-content-between m-0">
        <div class="row d-flex flex-row" >
            <div class="sidebar sticky-top d-flex flex-column justify-content-between align-items-start p-3 vh-100 bg-dark  start-0 top-0  col-2" >
                <div class="d-flex flex-column align-items-start gap-4">
                <a class="navbar-brand text-light" href="{% url 'entree' %}">STA</a>        
                <a class="text-decoration-none text-white" href="{% url 'entree' %}"><i class="fa-solid fa-box fa-lg text-light"></i>Les journaux</a>
                <a class="text-decoration-none text-white" href="{% url 'user_entrees' user.pk%}"><i class="fa-solid fa-qrcode fa-lg text-light"></i>Mes journaux</a>
                
                {% if user.is_superuser %}
                    <a class="text-decoration-none text-white" href="{% url 'liste_users' %}"><i class="fa-solid fa-gear fa-lg text-light"></i>les utilisateurs</a>
                {% endif %}
                </div>
                <div>
                {% if request.user.is_authenticated %}
                    <span class="text-white me-3">{{ request.user.username }}</span>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">Déconnexion</button>
                    </form>
                {% endif %}
                </div>
            </div>
            <div class="col-10 mt-4 ">
            
                {% block content %}
                    
                {% endblock content %}
            </div>
        </div>
    </div>
    
    
        
        
</body>
</html>
