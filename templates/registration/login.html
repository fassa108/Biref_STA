{% extends 'base.html' %}


{% block content %}
    {% if form.errors %}
        <div class="alert alert-danger">
            Identifiant ou mot de passe incorrect.
        </div>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit">Me Connecter</button>
    </form>

{% endblock content %}
