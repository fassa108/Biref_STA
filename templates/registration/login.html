{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block titre %}
        Document
        {% endblock titre %}
    </title>
    <!-- <link rel="stylesheet" href="{% static 'css/style.css' %}"> -->
    <script src="https://kit.fontawesome.com/cea1cd501f.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-body p-5">

                        <h3 class="mb-1">Connexion</h3>
                        <p class="text-muted mb-4">Accède à ton espace STA</p>

                        {% if form.errors %}
                        <div class="alert alert-danger rounded-3">
                            Identifiant ou mot de passe incorrect.
                        </div>
                        {% endif %}

                        <form method="POST">
                            {% csrf_token %}

                            
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Nom d'utilisateur</label>
                                <input type="text"
                                    name="username"
                                    class="form-control"
                                    placeholder="ex: aissatou"
                                    autofocus>
                            </div>

                           
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Mot de passe</label>
                                <input type="password"
                                    name="password"
                                    class="form-control"
                                    placeholder="••••••••">
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Me Connecter
                            </button>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
    
        
        
</body>
</html>
